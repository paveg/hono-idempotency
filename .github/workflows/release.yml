name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  statuses: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Defense-in-depth: the workflow_run trigger's `branches: [main]` filter only
    # restricts the head branch of the triggering CI run. A CI run started by a
    # `pull_request` event can still satisfy that filter, so we must also require
    # the triggering event to be `push` and the head branch to be literally `main`
    # before exposing id-token.
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          # Node 24 ships with npm 11.x (required for OIDC Trusted Publishing).
          # Node 22 ships with npm 10.x and self-upgrading via 'npm install -g npm@latest' is unreliable in CI.
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d  # v1.9.0
        id: changesets
        with:
          publish: pnpm release
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set ci-pass status on Version Packages PR
        if: steps.changesets.outputs.pullRequestNumber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: |
          sleep 5
          PR_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)
          gh api "repos/${{ github.repository }}/statuses/${PR_SHA}" \
            -f state=success \
            -f context=ci-pass \
            -f description="Version Packages PR — source already verified on main"
          # Retry if SHA changed due to API eventual consistency
          sleep 5
          NEW_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)
          if [ "$NEW_SHA" != "$PR_SHA" ]; then
            gh api "repos/${{ github.repository }}/statuses/${NEW_SHA}" \
              -f state=success \
              -f context=ci-pass \
              -f description="Version Packages PR — source already verified on main"
          fi
